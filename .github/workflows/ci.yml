name: Build & Tests
on:
  push:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '**.sh'
      - '**.py'
      - '**.ps1'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '**.sh'
      - '**.py'
      - '**.ps1'
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Qt 5 / Linux x86_64
            os: ubuntu-latest
            container:
              image: 'ubuntu:16.04'
              options: '--privileged'
            qt: 5
            env:
              ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
          - name: Qt 5 / macOS x86_64
            os: macos-13
            container: null
            qt: 5
          #- name: Qt 5 / macOS arm64
          #  os: macos-latest
          #  container: null
          #  qt: 5
          - name: Qt 5 / Windows x86
            os: windows-2019
            arch: win32_msvc2019
            container: null
            qt: 5
          - name: Qt 5 / Windows x86_64
            os: windows-2019
            arch: win64_msvc2019_64
            container: null
            qt: 5
          #- name: Qt 6 / Linux x86_64
          #  os: ubuntu-latest
          #  container:
          #    image: 'ubuntu:22.04'
          #    options: '--privileged'
          #  qt: 6
          #- name: Qt 6 / macOS x86_64
          #  os: macos-13
          #  container: null
          #  qt: 6
          #- name: Qt 6 / macOS arm64
          #  os: macos-latest
          #  container: null
          #  qt: 6
          #- name: Qt 6 / Windows x86_64
          #  os: windows-2019
          #  arch: win64_msvc2019_64
          #  container: null
          #  qt: 6
    name: ${{matrix.name}}
    runs-on: ${{matrix.os}}
    container: ${{matrix.container}}
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Install git (Linux)
        if: runner.os == 'Linux'
        run: |
          apt-get update -yq
          apt-get -yq install software-properties-common
          apt-add-repository -y ppa:git-core/ppa
          apt-get update -yq
          apt-get install -yq --no-install-suggests --no-install-recommends git
          apt-get install -yq --no-install-suggests --no-install-recommends curl
          apt-get install -yq --no-install-suggests --no-install-recommends tree
      - name: Check out repository
        if: runner.os != 'Linux' || matrix.qt != 5
        uses: actions/checkout@v3
      - name: Check out repository (alternative)
        if: runner.os == 'Linux' && matrix.qt == 5
        run: | 
          echo "Downloading library snapshot: https://github.com/${GITHUB_REPOSITORY}/archive/${GITHUB_SHA}.tar.gz"
          curl -L --retry 3 -o "${LIBRARY}-${GITHUB_SHA}.tar.gz" "https://github.com/${GITHUB_REPOSITORY}/archive/${GITHUB_SHA}.tar.gz"
          tar -xf "${LIBRARY}-${GITHUB_SHA}.tar.gz"
          tree
      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          arch: ${{matrix.arch}}
          qt: ${{matrix.qt}}
      - name: Set up environment
        uses: ./.github/actions/setup-environment
        with:
          arch: '${{matrix.arch}}'
      - name: Configure build
        run: >-
          mkdir build; ${{runner.os == 'Linux' && matrix.qt == 6 && 'qmake6' ||
          'qmake'}} -o build PREFIX=/usr CONFIG-=debug_and_release
          CONFIG+=release CONFIG+=GIT CONFIG+=PENCIL2D_${{
          startsWith(github.ref, 'refs/heads/release/') && 'RELEASE' ||
          'NIGHTLY' }} VERSION=${{ env.VERSION_NUMBER }}
      - name: Build Pencil2D
        working-directory: build
        run: '${{runner.os != ''Windows'' && ''make'' || ''nmake''}}'
      - name: Run tests
        env:
          QT_QPA_PLATFORM: minimal
        run: build/tests/tests
      - name: Create package
        id: package
        if: runner.os != 'Linux' || matrix.qt == 5
        uses: ./.github/actions/create-package
        with:
          arch: '${{matrix.arch}}'
          qt: '${{matrix.qt}}'
      - name: Upload package
        if: runner.os != 'Linux' || matrix.qt == 5
        uses: actions/upload-artifact@v3
        with:
          name: '${{steps.package.outputs.output-basename}}'
          path: 'build/${{steps.package.outputs.output-basename}}*'
      - name: Generate summary
        shell: bash
        run: >-
          echo "Build will be available for download
          [here](https://get.pencil2d.org/@${{github.repository_owner}}/${{github.run_id}}/${{steps.package.outputs.output-basename}})
          once the run is finished." > "${GITHUB_STEP_SUMMARY}"
