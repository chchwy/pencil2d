name: Build & Tests
on:
  push:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '**.sh'
      - '**.py'
      - '**.ps1'
  pull_request:
    # Need to repeat these paths - YAML anchors aren’t supported on GHA atm
    # (or any other CI service that I know of, for that matter)
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '**.sh'
      - '**.py'
      - '**.ps1'
  workflow_dispatch:
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          #- name: Qt 5 / Linux x86_64
          #  os: ubuntu-latest
          #  container: "ubuntu:16.04"
          #  qt: 5
          - name: Qt 5 / macOS x86_64
            os: macos-13
            container:
            qt: 5
          #- name: Qt 5 / macOS arm64
          #  os: macos-latest
          #  container:
          #  qt: 5
          #- name: Qt 5 / Windows x86
          #  os: windows-2022
          #  arch: win32_msvc2019
          #  vcvars: x86
          #  container:
          #  qt: 5
          #- name: Qt 5 / Windows x86_64
          #  os: windows-2022
          #  arch: win64_msvc2019_64
          #  vcvars: x64
          #  container:
          #  qt: 5
          #- name: Qt 6 / Linux x86_64
          #  os: ubuntu-latest
          #  container: "ubuntu:22.04"
          #  qt: 6
          - name: Qt 6 / macOS x86_64
            os: macos-13
            container:
            qt: 6
          #- name: Qt 6 / macOS arm64
          #  os: macos-latest
          #  container:
          #  qt: 6
          #- name: Qt 6 / Windows x86_64
          #  os: windows-2022
          #  arch: win64_msvc2019_64
          #  vcvars: x64
          #  container:
          #  qt: 6

    name: ${{matrix.name}}
    runs-on: ${{matrix.os}}
    env: { CONTAINER: "${{matrix.container}}", BUILD_CMD: "" }
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Notarize macOS app bundle
        if: runner.os == 'macOS'
        run: |
          echo "Notarization!!"
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          
          echo "${{secrets.P12_BASE64}}" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P ${{secrets.P12_PASSWORD}} -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm certificate.p12

          #download an zip and unzip it
          curl -L https://github.com/pencil2d/pencil/releases/download/v0.7.1-rc1/pencil2d-mac-x86_64-0.7.1-rc1.zip -o mac.zip
          unzip -o mac.zip -d pencil2d
          rm mac.zip

      - name: Sign App Bundle
        run: |
          # Find your certificate identity
          # Get certificate identity in multiple steps to avoid complex piping
          FIND_RESULT=$(security find-identity -v -p codesigning build.keychain)
          DEV_ID_LINE=$(echo "$FIND_RESULT" | grep "Developer ID Application")
          QUOTED_CERT=$(echo "$DEV_ID_LINE" | grep -o '"[^"]*"')
          CERT_IDENTITY=$(echo "$QUOTED_CERT" | tr -d '"')
          echo "Using certificate: $CERT_IDENTITY"

          cd pencil2d
          # Sign all binaries and frameworks first
          find ./Pencil2D.app -name "*.dylib" -exec codesign --force --verify --verbose --sign "$CERT_IDENTITY" {} \;
          find ./Pencil2D.app -name "*.framework" -exec codesign --force --verify --verbose --sign "$CERT_IDENTITY" {} \;
          
          # Sign the main app bundle
          codesign --force --options runtime --sign "$CERT_IDENTITY" ./Pencil2D.app
          
          # Verify signing
          codesign --verify --verbose ./Pencil2D.app
          spctl -a -v ./Pencil2D.app

      - name: Set up container (Linux)
        if: runner.os == 'Linux'
        # XXX: --privileged is sort of a brute-force solution to get FUSE
        #      working inside Docker, however so far I haven’t been able to
        #      figure out precisely *which* privileges are needed.
        run: |
          touch "${{github.workspace}}/env"
          docker run --detach --privileged --workdir /workspace --volume "${{github.workspace}}:/workspace" --name "ci_${{github.sha}}" --entrypoint "tail" "${{matrix.container}}" -f /dev/null
          echo '#!/usr/bin/env bash' > "${{github.workspace}}/build-cmd"
          echo 'exec docker exec --env-file <(cat "${{github.workspace}}/env") "ci_${{github.sha}}" "$@"' >> "${{github.workspace}}/build-cmd"
          chmod +x "${{github.workspace}}/build-cmd"
          echo 'BUILD_CMD=${{github.workspace}}/build-cmd' >> "${GITHUB_ENV}"
      - name: Install dependencies
        uses: ./.github/actions/install-dependencies
        with:
          arch: ${{matrix.arch}}
          qt: ${{matrix.qt}}
      - name: Set up environment
        uses: ./.github/actions/setup-environment
        with:
          arch: ${{matrix.arch}}
          vcvars: ${{matrix.vcvars}}
      - name: Configure build
        run: >
          mkdir build; ${{runner.os == 'Linux' && '${BUILD_CMD}' || ''}}
          ${{runner.os == 'Linux' && matrix.qt == 6 && 'qmake6' || 'qmake'}}
          -o build PREFIX=/usr CONFIG-=debug_and_release CONFIG+=release CONFIG+=GIT
          CONFIG+=PENCIL2D_${{ startsWith(github.ref, 'refs/heads/release/') && 'RELEASE' || 'NIGHTLY' }}
          VERSION=${{ env.VERSION_NUMBER }}

      - name: Build Pencil2D
        run: ${{runner.os != 'Windows' && '${BUILD_CMD} make -C build' || 'cd build; nmake'}}

      - name: Run tests
        run: ${{runner.os == 'Linux' && '${BUILD_CMD}' || ''}} env QT_QPA_PLATFORM=minimal build/tests/tests
        
        #uses: ./.github/actions/notarize-macos-app
        #with:
        #  app_path: build/Pencil2D.app
        #  apple_id: ${{ secrets.APPLE_ID }}
        # apple_id_password: ${{ secrets.APPLE_ID_PASSWORD }}
        #  team_id: ${{ secrets.APPLE_TEAM_ID }}
  
      - name: Create package
        id: package
        if: runner.os != 'Linux' || matrix.qt == 5
        uses: ./.github/actions/create-package
        with:
          arch: ${{matrix.arch}}
          qt: ${{matrix.qt}}

      - name: Upload package
        if: runner.os != 'Linux' || matrix.qt == 5
        uses: actions/upload-artifact@v4
        with:
          name: ${{steps.package.outputs.output-basename}}
          path: build/${{steps.package.outputs.output-basename}}*
      - name: Generate summary
        shell: bash
        run: >
          echo "Build will be available for download
          [here](https://get.pencil2d.org/@${{github.repository_owner}}/${{github.run_id}}/${{steps.package.outputs.output-basename}})
          once the run is finished." > "${GITHUB_STEP_SUMMARY}"

      - name: Stop container (Linux)
        if: runner.os == 'Linux'
        run: docker stop "ci_${{github.sha}}"
