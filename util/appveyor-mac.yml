
clone_depth: 1

image:
  - macos-monterey

platform:
  - x64

skip_commits:
  files:
    - '*.md'
    - docs/*
    - util/appveyor-msvc.yml
    - /.github/*

install:
  - export QTDIR=$HOME/Qt/6.5.3/macos

init:
  - uname -a
  - echo $PLATFORM

before_build:
  - export PATH=$QTDIR/bin:$PATH
  - cmake --version
  - qmake --version

build_script:
  - pwd
  - mkdir build
  - cd build
  - cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH=$QTDIR -DPENCIL2D_NIGHTLY=ON -DAPP_VERSION=$APPVEYOR_BUILD_VERSION
  - cmake --build . --config Release --parallel --target pencil2d
  - cmake --build . --config Release --parallel --target pencil2d_tests

after_build:
  - macdeployqt "$APPVEYOR_BUILD_FOLDER/build/Release/pencil2d.app" -dmg

test_script:
  - echo "Running tests"
  - ctest -C Release --output-on-failure

artifacts:
  - path: build/pencil2d.dmg
    name: Pencil2D-macOS
