
clone_depth: 1

image:
  - Visual Studio 2015

platform:
  - x86

skip_commits:
  files:
    - '*.md'
    - docs/*
    - util/appveyor-msvc.yml

init:
  - ver
  - echo %PLATFORM%

before_build:
  - set QTDIR=C:\Qt\%qt%
  - set PATH=%QTDIR%\bin;C:\Qt\Tools\%mingw%\bin;%PATH%;
  - cd %QTDIR%\bin
  - dir
  - qmake --version

build_script:
  - echo %APPVEYOR_BUILD_FOLDER%
  - md build
  - cd build
  - qmake "%APPVEYOR_BUILD_FOLDER%\pencil2d.pro" CONFIG+=GIT CONFIG+=Release CONFIG+=PENCIL2D_NIGHTLY
  - mingw32-make -j2

after_build:
  - windeployqt "%APPVEYOR_BUILD_FOLDER%\build\app\release\pencil2d.exe"
  - powershell "%APPVEYOR_BUILD_FOLDER%\util\win-deploy.ps1" -platform x86

test_script:
  - echo "Running tests"
  - cd "%APPVEYOR_BUILD_FOLDER%\build\tests\release"
  - tests.exe

for:
- matrix:
    only:
      - image: Visual Studio 2015
  install:
    - if %PLATFORM%==x86   set qt=5.9\mingw53_32
    - if %PLATFORM%==x86   set mingw=mingw530_32

matrix:
  exclude:
    - image: Visual Studio 2015
      platform: x64
