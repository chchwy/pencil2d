
clone_depth: 1

image:
  - Visual Studio 2019

platform:
  - x64

skip_commits:
  files:
    - '*.md'
    - docs/*
    - util/appveyor-msvc.yml
    - /.github/*

init:
  - ver
  - set qt=6.8.3\mingw_64
  - set mingw=mingw1120_64

before_build:
  - set QTDIR=C:\Qt\%qt%
  - dir %QTDIR%\bin
  - set MINGW_DIR=C:\Qt\mingw_64\Tools\%mingw%
  - set PATH=%QTDIR%\bin;%PATH%
  - echo %PATH%
  - dir %QTDIR%\bin\qmake.exe
  - where qmake
  - C:\Qt\6.8.3\mingw_64\bin\qmake.exe --version
  - mingw32-make.exe --version


  
build_script:
  - echo %APPVEYOR_BUILD_FOLDER%
  - md build
  - cd build
  - qmake "%APPVEYOR_BUILD_FOLDER%\pencil2d.pro" CONFIG+=GIT CONFIG+=Release CONFIG+=PENCIL2D_NIGHTLY
  - mingw32-make -j2

after_build:
  - windeployqt "%APPVEYOR_BUILD_FOLDER%\build\app\release\pencil2d.exe"

test_script:
  - echo "Running tests"
  - cd "%APPVEYOR_BUILD_FOLDER%\build\tests\release"
  - tests.exe

